<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generátor | Easy3Dtisk</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent: #ff6600; 
            --dark: #1a1a1a;
            --border: #f0f0f0;
            --soft-bg: #f5f5f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; color: var(--dark); padding: 40px 20px; }
        
        .card { 
            max-width: 850px; 
            margin: 0 auto; 
            background: #fff; 
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
        }

        h2 { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 900; margin-bottom: 20px; grid-column: 1 / -1; }
        h2 span { color: var(--accent); }

        .form-section { display: flex; flex-direction: column; gap: 15px; }
        
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        .form-group { flex: 1; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; color: #86868b; }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            background: var(--soft-bg); 
            font-family: inherit; 
            font-size: 0.95rem;
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: var(--accent); background: #fff; }

        .btn-gen { 
            margin-top: 10px;
            background: var(--accent); 
            color: #fff; 
            padding: 15px; 
            border: none; 
            border-radius: 100px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.4s;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .btn-gen:hover { background: var(--dark); transform: translateY(-2px); }

        /* --- VÝSLEDEK --- */
        .result-section { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background: var(--soft-bg);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }
        
        #qr-image { 
            max-width: 100%; 
            height: auto; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            background: #fff;
            padding: 10px;
            display: none; /* Ukáže se až po vygenerování */
        }

        .price-tag { font-family: 'Outfit', sans-serif; font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; display: none; }
        
        .placeholder-text { color: #b0b0b5; font-size: 0.9rem; font-style: italic; }

        @media (max-width: 768px) {
            .card { grid-template-columns: 1fr; }
            .result-section { order: -1; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>QR <span>Generátor.</span></h2>
    
    <div class="form-section">
        <label>Číslo účtu a kód banky *</label>
        <div class="input-row">
            <input type="text" id="prefix" placeholder="000000" style="flex: 0.4; text-align: center;">
            <span>-</span>
            <input type="text" id="acc" placeholder="Číslo účtu" style="flex: 1;">
            <span>/</span>
            <input type="text" id="bank" placeholder="0100" style="flex: 0.5;">
        </div>

        <div class="input-row">
            <div class="form-group" style="flex: 2;">
                <label>Částka</label>
                <input type="number" id="amount" placeholder="0.00">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Měna</label>
                <select id="cc">
                    <option value="CZK">CZK</option>
                    <option value="EUR">EUR</option>
                </select>
            </div>
        </div>

        <div class="input-row">
            <div class="form-group">
                <label>VS</label>
                <input type="text" id="vs" maxlength="10">
            </div>
            <div class="form-group">
                <label>SS</label>
                <input type="text" id="ss" maxlength="10">
            </div>
        </div>

        <div class="form-group">
            <label>Zpráva pro příjemce</label>
            <textarea id="msg" rows="2" maxlength="60" placeholder="Např. Poptavka tisk"></textarea>
        </div>

        <button class="btn-gen" onclick="makeQR()">Vytvořit QR platbu</button>
    </div>

    <div class="result-section" id="res-box">
        <div class="placeholder-text" id="placeholder">Zadejte údaje a klikněte na tlačítko</div>
        <div class="price-tag" id="price-display"></div>
        <img id="qr-image" src="" alt="QR Platba">
        <button onclick="window.print()" id="print-btn" style="display:none; background:none; border:none; color:var(--accent); font-weight:700; margin-top:15px; cursor:pointer;">
            <i class="fas fa-print"></i> Tisk / Uložit
        </button>
    </div>
</div>

<script>
    function makeQR() {
        const prefix = document.getElementById('prefix').value.trim();
        const acc = document.getElementById('acc').value.trim();
        const bank = document.getElementById('bank').value.trim();
        const amount = document.getElementById('amount').value;
        const cc = document.getElementById('cc').value;
        const vs = document.getElementById('vs').value;
        const ss = document.getElementById('ss').value;
        const msg = document.getElementById('msg').value;

        if (!acc || !bank || !amount) {
            alert("Číslo účtu, kód banky a částka jsou povinné!");
            return;
        }

        // Sestavení plného čísla účtu pro Paylibo API
        const fullAccount = prefix ? `${prefix}${acc}` : acc;

        // Odstranění diakritiky (velmi důležité pro bankovní systémy)
        const cleanMsg = msg.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        // Sestavení URL (Paylibo API)
        let url = `https://api.paylibo.com/paylibo/generator/czech/image?accountNumber=${fullAccount}&bankCode=${bank}&amount=${amount}&currency=${cc}`;
        
        if (vs) url += `&vs=${vs}`;
        if (ss) url += `&ss=${ss}`;
        if (cleanMsg) url += `&message=${encodeURIComponent(cleanMsg)}`;

        // Zobrazení výsledku
        const qrImg = document.getElementById('qr-image');
        const priceTag = document.getElementById('price-display');
        const placeholder = document.getElementById('placeholder');
        const printBtn = document.getElementById('print-btn');

        qrImg.style.display = "none";
        qrImg.src = url;

        qrImg.onload = function() {
            placeholder.style.display = "none";
            qrImg.style.display = "block";
            priceTag.style.display = "block";
            priceTag.textContent = `${amount} ${cc}`;
            printBtn.style.display = "block";
            
            // Animace vložení
            document.getElementById('res-box').style.background = "#fff";
            document.getElementById('res-box').style.border = "2px solid var(--accent)";
        };

        qrImg.onerror = function() {
            alert("Chyba při generování QR kódu. Zkontrolujte údaje.");
        };
    }
</script>

</body>
</html>
