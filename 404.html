<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Model nenalezen | Easy3Dtisk</title>
    
    <link rel="icon" type="image/png" href="https://i.imgur.com/qnp7Nqk.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ff6600; 
            --dark: #1a1a1a;
            --text: #1d1d1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #ffffff; 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            overflow: hidden;
        }

        .error-container { padding: 30px; }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            color: #f0f0f0;
            position: relative;
            z-index: 1;
        }

        .error-code span {
            color: var(--accent);
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            font-size: 8rem;
        }

        h1 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; margin-top: -20px; letter-spacing: -1px; }
        p { color: #6e6e73; font-size: 1.1rem; margin: 20px 0 40px; line-height: 1.6; }

        .btn-home {
            display: inline-block;
            background: var(--dark);
            color: white;
            padding: 18px 45px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-home:hover {
            background: var(--accent);
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(255,102,0,0.2);
        }

        .spaghetti {
            position: absolute;
            bottom: -50px;
            left: 0;
            width: 100%;
            height: 150px;
            background: radial-gradient(circle, var(--accent) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code">
        404
        <span>404</span>
    </div>
    <h1>Ups! Tady došlo k chybě v tisku.</h1>
    <p>Stránka, kterou hledáte, se nejspíš "odlepila od podložky" nebo nikdy neexistovala.<br>
    Zkuste se vrátit na začátek a začít znovu.</p>
    
    <a href="/easy3dtisk/" class="btn-home">Zpět na hlavní stránku</a>
</div>

<div class="spaghetti"></div>

</body>
</html>
